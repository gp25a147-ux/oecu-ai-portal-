<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OECU時間割連動AIポータル | 大阪電気通信大学 在学生向けアシスタント</title>
  <!-- Google Fonts: Outfit & Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- グローバルスタイル -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-container">
    
    <!-- 左サイドバー: 時間割ナビゲーション (アコーディオン) -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color);">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm0 16a6 6 0 1 1 6-6 6 6 0 0 1-6 6Z"/>
            <circle cx="12" cy="12" r="2"/>
          </svg>
          <span>OECU AI Portal</span>
        </div>
        <button id="settings-btn" class="btn-icon" title="設定⚙️">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <!-- 画像と同じスタイルの「＋ 新規チャット」ボタン -->
      <button id="sidebar-new-chat-btn" class="new-chat-sidebar-btn">
        <span style="font-size: 1.2rem; font-weight: 500; margin-right: 4px; line-height: 1;">＋</span>
        <span>新規チャット</span>
      </button>
      
      <!-- 曜日別時間割コンテナ (アコーディオン) -->
      <div id="timetable" class="timetable-container" style="padding-top: 0;">
        <!-- JSでアコーディオン構造が自動的に構築されます -->
      </div>
    </aside>

    <!-- 中央メインチャットエリア -->
    <main class="main-chat">
      <div class="chat-header">
        <div class="chat-title-area">
          <div id="chat-title" class="chat-title">授業を選択してください</div>
          <div id="chat-subtitle" class="chat-subtitle">講義情報</div>
        </div>
        <div class="header-actions">
          <button id="theme-toggle" class="btn-icon" title="テーマ切り替え">
            <!-- テーマに対応したアイコンがJSで挿入されます -->
          </button>
        </div>
      </div>

      <!-- メッセージ履歴 -->
      <div id="messages-container" class="messages-container">
        <!-- メッセージバブルが動的に追加されます -->
      </div>

      <!-- 入力エリア -->
      <div class="chat-input-area">
        
        <!-- 添付ファイルプレビュー表示領域 -->
        <div id="file-preview-container" class="preview-files-container"></div>
        
        <div class="input-row">
          <!-- 添付ファイル隠しInput -->
          <input type="file" id="file-input" style="display: none;" multiple accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt">
          
          <button id="attach-btn" class="btn-icon" title="ファイルを添付 (画像・PDF・Office等)" style="background: var(--card-bg); border: 1px solid var(--glass-border); width: 44px; height: 44px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          
          <div class="chat-input-wrapper">
            <input type="text" id="chat-input" placeholder="質問を入力するか、ファイルを貼ってね（例: レポート構成のアドバイスなど）...">
          </div>
          
          <button id="send-btn" class="btn-primary" style="height: 44px; width: 44px; padding: 0; justify-content: center; border-radius: 16px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </main>

    <!-- 右サイドパネル: シラバス詳細 ＆ Moodle連携 -->
    <aside class="right-panel">
      
      <!-- シラバスセクション -->
      <section class="panel-section">
        <div class="panel-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6 6h10"/><path d="M6 10h10"/></svg>
          <span>今日の授業・シラバス連携</span>
        </div>
        <!-- 講義進行度（週数）の選択 -->
        <div class="selector-row">
          <label style="font-size: 0.75rem; display: flex; align-items: center; gap: 4px; font-weight: 600; color: var(--text-muted);">
            進行週:
            <select id="syllabus-select-week">
              <!-- JSで15回分の選択肢を挿入 -->
            </select>
          </label>
        </div>
        <!-- 動的シラバス情報 -->
        <div id="syllabus-panel">
          <!-- JSで授業情報とテスト対策が挿入されます -->
        </div>
      </section>

      <!-- Moodleコピペ連携 ＆ Moodle個人同期セクション -->
      <section class="panel-section">
        <div class="panel-title" style="color: var(--accent-color);">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-color);"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Moodle 接続ポータル (デモ版)</span>
        </div>
        
        <!-- 個人Moodleアカウント同期 (デモ用) -->
        <div class="moodle-sync-container" style="background: rgba(255, 153, 0, 0.05); border: 1px solid rgba(255, 153, 0, 0.15); padding: 12px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px;">
          <div style="font-size: 0.72rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center;">
            <span>同期ステータス:</span>
            <span id="moodle-sync-status" style="color: var(--text-muted);">未連携</span>
          </div>
          
          <div id="moodle-user-info" style="display: none; font-size: 0.72rem; border-top: 1px solid rgba(255, 153, 0, 0.1); padding-top: 6px;">
            <div style="font-weight: 700; color: var(--text-main);">連携中: <span id="moodle-student-name">電通 創太</span> さん</div>
            <div style="color: var(--text-muted);">所属: 情報通信工学部 2年</div>
          </div>
          
          <button id="moodle-sync-btn" class="btn-primary" style="font-size: 0.75rem; justify-content: center; padding: 8px; border-radius: 8px; background: var(--primary-color); width: 100%;">
            Moodleから個人データを同期 (デモ)
          </button>
          
          <!-- 同期プログレスバー (アニメーション用) -->
          <div id="moodle-sync-loader" style="display: none; width: 100%; height: 6px; background: rgba(0,0,0,0.05); border-radius: 3px; overflow: hidden; position: relative;">
            <div id="moodle-sync-progress-bar" style="width: 0%; height: 100%; background: var(--accent-color); transition: width 0.3s ease;"></div>
          </div>
        </div>

        <div style="border-top: 1px solid var(--glass-border); padding-top: 10px; margin-top: 4px;">
          <p style="font-size: 0.72rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 8px;">
            ※手動で課題テキストを貼り付けて時間割にリマインドすることもできます。
          </p>
          <textarea id="moodle-textarea" class="moodle-paste-area" placeholder="ここにMoodleの課題文章をコピー＆ペーストしてね..."></textarea>
          <button id="moodle-parse-btn" class="btn-primary" style="font-size: 0.75rem; justify-content: center; padding: 8px; border-radius: 8px; background: var(--accent-color); box-shadow: 0 4px 12px rgba(255, 153, 0, 0.2); width: 100%; margin-top: 6px;">
            Moodle課題を連携
          </button>
        </div>

        <!-- 連携された課題リスト -->
        <div id="moodle-tasks-list" style="display: flex; flex-direction: column; gap: 8px; margin-top: 5px;">
          <!-- 連携されたタスクがカードで入ります -->
        </div>
      </section>

      <!-- OECU クイックリンク集 -->
      <section class="panel-section">
        <div class="panel-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <span>学内クイックリンク</span>
        </div>
        <div id="quick-links" class="quick-links">
          <!-- JSでリンクが挿入されます -->
        </div>
      </section>

    </aside>

  </div>

  <!-- 設定モーダル (APIキー・学年・年度) -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">ポータル設定⚙️</div>
        <button id="close-modal" class="btn-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="modal-grade">自分の学年</label>
          <select id="modal-grade">
            <option value="1">1年生</option>
            <option value="2">2年生</option>
            <option value="3">3年生</option>
          </select>
        </div>
        <div class="form-group">
          <label for="modal-year">受講年度</label>
          <select id="modal-year">
            <option value="2026">2026年度</option>
            <option value="2025">2025年度</option>
          </select>
        </div>
        <div class="form-group">
          <label for="modal-apikey">Gemini API キー (Google AI Studioで無料取得)</label>
          <input type="password" id="modal-apikey" placeholder="AI-zaSy... (未設定時はデモモードで動作)">
          <p style="font-size: 0.65rem; color: var(--text-muted); line-height: 1.4; margin-top: 4px;">
            ※入力されたAPIキーはブラウザのLocalStorageにのみ安全に保存され、他のサーバーへ送信されることはありません。
          </p>
        </div>
      </div>
      <div class="modal-footer">
        <button id="save-settings" class="btn-primary" style="border-radius: 8px;">設定を保存</button>
      </div>
    </div>
  </div>

  <!-- アプリメインモジュール実行 -->
  <script type="module">
    import { initApp } from './src/app.js';
    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
